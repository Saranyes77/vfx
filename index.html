<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VFX Artist</title>

<style>
/* ================= GLOBAL ================= */

body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background: #e9e9e9;
  line-height: 1.6;
  color: #111;
}

.section {
  padding: 100px 80px;
}

@media (max-width: 768px) {
  .section {
    padding: 60px 25px;
  }
}

.section-title {
  font-size: 40px;
  font-weight: 700;
  margin-bottom: 50px;
  text-align: center;
}

/* ================= HERO ================= */

.hero {
  background: white;
}

.tagline {
  font-size: 18px;
  color: rgba(0,0,0,0.7);
  margin-bottom: 20px;
}

.heading {
  font-size: 70px;
  font-weight: 800;
  margin: 0;
}

@media (min-width: 768px) {
  .heading {
    font-size: 110px;
  }
}

.description {
  margin-top: 20px;
  font-size: 20px;
  max-width: 600px;
  color: rgba(0,0,0,0.8);
}

/* ================= SOFTWARES ================= */

.softwares {
  background: #f6f6f6;
}

.software-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 50px;
  max-width: 900px;
  margin: auto;
  align-items: center;
}

.software-grid img {
  width: 80px;
  margin: auto;
  display: block;
  transition: transform 0.3s ease, opacity 0.3s ease;
}

.software-grid img:hover {
  transform: scale(1.15);
  opacity: 0.8;
}

/* ================= SHOWREEL ================= */

.showreel {
  background: white;
}

.video-wrapper {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  max-width: 1000px;
  margin: auto;
}

.video-wrapper iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  border: none;
}

/* ================= FOOTER ================= */

.footer {
  background: #111;
  color: white;
  text-align: center;
  padding: 40px 20px;
  font-size: 14px;
}
</style>
</head>

<body>

<!-- ================= HERO ================= -->

<section class="section hero">
  <div class="tagline">Creative Visual Effects</div>
  <h1 class="heading">VFX Artist</h1>
  <p class="description">
    I create cinematic visual effects, simulations, and digital environments 
    for film, commercials, and interactive media.
  </p>
</section>

<!-- ================= SOFTWARES ================= -->

<section class="section softwares">
  <h2 class="section-title">Softwares I Use</h2>

  <div class="software-grid">
    <img src="ae.png" alt="After Effects">
    <img src="blender.png" alt="Blender">
    <img src="maya.png" alt="Maya">
    <img src="nuke.png" alt="Nuke">
    <img src="pr.png" alt="Premiere Pro">
    <img src="ps.png" alt="Photoshop">
  </div>
</section>

<!-- ================= SHOWREEL ================= -->

<section class="section showreel">
  <h2 class="section-title">Showreel</h2>

  <div class="video-wrapper">
    <iframe
      src="https://www.youtube.com/embed/YOUR_VIDEO_ID"
      title="VFX Showreel"
      allowfullscreen>
    </iframe>
  </div>
</section>

<!-- ================= FOOTER ================= -->

<footer class="footer">
  © 2026 VFX Artist Portfolio
</footer>

</body>
</html>
