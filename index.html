<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>VFX Artist</title>

<style>

/* ================= GLOBAL ================= */

body {
  margin: 0;
  font-family: 'Arial Black', Arial, Helvetica, sans-serif;
  background: #dcdcdc;
  line-height: 1.6;
  color: #111;
}

.section {
  padding: 100px 80px;
  border-bottom: 2px solid #111;
}

@media (max-width: 768px) {
  .section {
    padding: 60px 25px;
  }
}

.section-title {
  font-size: 60px;
  font-weight: 900;
  margin-bottom: 60px;
  text-align: center;
  letter-spacing: 2px;
  position: relative;
}

.section-title::after {
  content: "";
  width: 120px;
  height: 6px;
  background: #f4b21d;
  display: block;
  margin: 15px auto 0;
}

/* ================= HERO ================= */

.hero {
  background: #efefef;
}

.tagline {
  font-size: 18px;
  background: #f4b21d;
  display: inline-block;
  padding: 6px 14px;
  font-weight: bold;
  margin-bottom: 25px;
}

.heading {
  font-size: 120px;
  font-weight: 900;
  margin: 0;
  line-height: 1;
  letter-spacing: 3px;
}

@media (min-width: 768px) {
  .heading {
    font-size: 140px;
  }
}

.description {
  margin-top: 30px;
  font-size: 20px;
  max-width: 650px;
  color: #333;
  border-left: 6px solid #f4b21d;
  padding-left: 20px;
}

/* ================= SOFTWARES ================= */

.softwares {
  background: #f6f6f6;
}

.software-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
  gap: 60px;
  max-width: 900px;
  margin: auto;
  align-items: center;
}

.software-grid img {
  width: 80px;
  margin: auto;
  display: block;
  padding: 25px;
  background: #fff;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,.1);
  transition: 0.3s ease;
}

.software-grid img:hover {
  transform: translateY(-8px) scale(1.1);
}

/* ================= SHOWREEL ================= */

.showreel {
  background: #efefef;
}

.video-wrapper {
  position: relative;
  padding-bottom: 56.25%;
  height: 0;
  max-width: 1000px;
  margin: auto;
  border: 8px solid #111;
  box-shadow: 0 20px 40px rgba(0,0,0,.25);
}

.video-wrapper iframe {
  position: absolute;
  width: 100%;
  height: 100%;
  border: none;
}

/* ================= FOOTER ================= */

.footer {
  background: #111;
  color: white;
  text-align: center;
  padding: 40px 20px;
  font-size: 14px;
  letter-spacing: 2px;
}

</style>
</head>

<body>

<!-- ================= HERO ================= -->

<section class="section hero">
  <div class="tagline">Creative Visual Effects</div>

  <h1 class="heading">VFX Artist</h1>

  <p class="description">
    I create cinematic visual effects, simulations, and digital environments 
    for film, commercials, and interactive media.
  </p>
</section>


<!-- ================= SOFTWARES ================= -->

<section class="section softwares">
  <h2 class="section-title">Softwares I Use</h2>

  <div class="software-grid">
    <img src="ae.png" alt="After Effects">
    <img src="blender.png" alt="Blender">
    <img src="maya.png" alt="Maya">
    <img src="nuke.png" alt="Nuke">
    <img src="pr.png" alt="Premiere Pro">
    <img src="ps.png" alt="Photoshop">
  </div>
</section>


<!-- ================= SHOWREEL ================= -->

<section class="section showreel">
  <h2 class="section-title">Showreel</h2>

  <div class="video-wrapper">
    <iframe
      src="https://youtu.be/SzxzULb0jeE?si=t0y9Vh6i7tyYRdTP"
      title="VFX Showreel"
      allowfullscreen>
    </iframe>
  </div>
</section>


<!-- ================= FOOTER ================= -->

<footer class="footer">
  © 2026 VFX Artist Portfolio
</footer>

</body>
</html>
